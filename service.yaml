apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  # Cloud Run service name – must match $_SERVICE_NAME in cloudbuild.yaml
  name: eboss-manager
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # -------------------------------------------------------
        # Auto-scaling
        # -------------------------------------------------------
        autoscaling.knative.dev/minScale: "0"   # Scale to zero when idle
        autoscaling.knative.dev/maxScale: "10"  # Maximum 10 instances

        # Use second-generation execution environment for better cold-start
        run.googleapis.com/execution-environment: gen2

        # Startup CPU boost reduces cold-start latency
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      # Service account with Secret Manager access (create in GCP IAM)
      # serviceAccountName: eboss-manager-sa@PROJECT_ID.iam.gserviceaccount.com

      # Maximum request concurrency per instance
      containerConcurrency: 80

      # Request timeout (nginx serves static files quickly)
      timeoutSeconds: 60

      containers:
        - image: IMAGE_PLACEHOLDER  # Replaced by cloudbuild.yaml at deploy time
          ports:
            - name: http1
              containerPort: 8080

          resources:
            limits:
              cpu: "1"
              memory: 512Mi

          # -------------------------------------------------------
          # Environment variables injected from Secret Manager
          # -------------------------------------------------------
          env:
            # Supabase
            - name: VITE_SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-url
                  key: latest

            - name: VITE_SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-anon-key
                  key: latest

            # Salesforce OAuth (public client-side values only)
            # NOTE: VITE_SF_CLIENT_ID is a public identifier embedded in the
            # frontend bundle; it is safe to expose in the browser.
            # The client secret must NOT be used in the SPA – OAuth flows
            # requiring the secret should be handled server-side.
            - name: VITE_SF_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: sf-client-id
                  key: latest

            - name: VITE_SF_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: sf-redirect-uri
                  key: latest

          # -------------------------------------------------------
          # Health checks
          # -------------------------------------------------------
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
            timeoutSeconds: 3

          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 3

  # -------------------------------------------------------
  # Traffic – 100% to the latest revision
  # -------------------------------------------------------
  traffic:
    - percent: 100
      latestRevision: true
