<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kimi Vision - Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-500: hsl(250, 75%, 55%);
      --primary-600: hsl(250, 70%, 48%);
      --primary-700: hsl(250, 65%, 40%);
      --accent-500: hsl(160, 85%, 45%);
      --accent-600: hsl(160, 90%, 38%);
      --neutral-50: hsl(250, 20%, 98%);
      --neutral-100: hsl(250, 15%, 94%);
      --neutral-200: hsl(250, 12%, 86%);
      --neutral-300: hsl(250, 10%, 74%);
      --neutral-400: hsl(250, 8%, 58%);
      --neutral-500: hsl(250, 7%, 44%);
      --neutral-600: hsl(250, 8%, 32%);
      --neutral-700: hsl(250, 10%, 22%);
      --neutral-800: hsl(250, 12%, 14%);
      --neutral-900: hsl(250, 15%, 8%);
      
      --bg: var(--neutral-900);
      --bg-elevated: var(--neutral-800);
      --bg-card: hsl(250, 12%, 16%);
      --text: var(--neutral-50);
      --text-secondary: var(--neutral-300);
      --text-muted: var(--neutral-400);
      --border: hsl(250, 15%, 22%);
      
      --font-display: 'Space Grotesk', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      
      --shadow-lg: 0 20px 25px rgba(0, 0, 0, 0.25), 0 10px 10px rgba(0, 0, 0, 0.15);
      --radius-lg: 16px;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 50% -20%, hsla(250, 70%, 48%, 0.12), transparent),
        radial-gradient(ellipse 50% 30% at 100% 100%, hsla(160, 70%, 40%, 0.06), transparent);
      pointer-events: none;
    }
    
    .container {
      position: relative;
      width: 100%;
      max-width: 520px;
    }
    
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow-lg);
    }
    
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .logo {
      width: 56px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--primary-600), var(--primary-500));
      border-radius: 14px;
      margin: 0 auto 20px;
      box-shadow: 0 0 20px hsla(250, 75%, 55%, 0.3);
    }
    
    .logo svg {
      width: 28px;
      height: 28px;
      color: white;
    }
    
    h1 {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text), var(--primary-200));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    
    .subtitle {
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 24px;
    }
    
    label {
      display: block;
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    
    .input-wrapper {
      position: relative;
    }
    
    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 14px;
      transition: all 0.2s ease;
    }
    
    input[type="text"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: var(--accent-500);
      box-shadow: 0 0 0 3px hsla(160, 85%, 45%, 0.1);
    }
    
    input::placeholder {
      color: var(--neutral-500);
    }
    
    .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .toggle-password:hover {
      color: var(--text);
    }
    
    .toggle-password svg {
      width: 18px;
      height: 18px;
    }
    
    .help-text {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
      line-height: 1.5;
    }
    
    .help-text a {
      color: var(--accent-400);
      text-decoration: none;
    }
    
    .help-text a:hover {
      text-decoration: underline;
    }
    
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 32px;
    }
    
    button {
      flex: 1;
      padding: 14px 24px;
      border-radius: 10px;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-600), var(--accent-500));
      border: none;
      color: white;
      box-shadow: 0 0 0 1px hsla(160, 85%, 45%, 0.3);
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px hsla(160, 85%, 45%, 0.3), 0 0 0 1px hsla(160, 85%, 45%, 0.5);
    }
    
    .btn-secondary {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    
    .btn-secondary:hover {
      background: var(--bg-card);
      border-color: var(--primary-400);
      color: var(--text);
    }
    
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 13px;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.3s ease;
    }
    
    .status.visible {
      opacity: 1;
      transform: translateY(0);
    }
    
    .status.success {
      background: hsla(160, 85%, 45%, 0.1);
      border: 1px solid hsla(160, 85%, 45%, 0.2);
      color: var(--accent-400);
    }
    
    .status.error {
      background: hsla(0, 70%, 50%, 0.1);
      border: 1px solid hsla(0, 70%, 50%, 0.2);
      color: hsl(0, 70%, 65%);
    }
    
    .status svg {
      width: 16px;
      height: 16px;
    }
    
    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 32px;
      padding-top: 32px;
      border-top: 1px solid var(--border);
    }
    
    .feature {
      text-align: center;
    }
    
    .feature-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-elevated);
      border-radius: 10px;
      margin: 0 auto 10px;
      color: var(--primary-400);
    }
    
    .feature-icon svg {
      width: 20px;
      height: 20px;
    }
    
    .feature-title {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    
    .feature-desc {
      font-size: 11px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v6M12 17v6M4.22 4.22l4.24 4.24M15.54 15.54l4.24 4.24M1 12h6M17 12h6M4.22 19.78l4.24-4.24M15.54 8.46l4.24-4.24"/>
          </svg>
        </div>
        <h1>Kimi Vision Settings</h1>
        <p class="subtitle">Configure your AI-powered screenshot analysis</p>
      </div>
      
      <form id="settingsForm">
        <div class="form-group">
          <label for="apiKey">Kimi API Key</label>
          <div class="input-wrapper">
            <input 
              type="password" 
              id="apiKey" 
              name="apiKey"
              placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
              autocomplete="off"
            >
            <button type="button" class="toggle-password" id="togglePassword">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <p class="help-text">
            Get your API key from <a href="https://platform.moonshot.cn/" target="_blank">Moonshot AI Platform</a>.
            Your key is stored securely in your browser's sync storage.
          </p>
        </div>
        
        <div class="actions">
          <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
          <button type="submit" class="btn-primary">Save Settings</button>
        </div>
      </form>
      
      <div class="status" id="status">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        <span id="statusText">Settings saved successfully!</span>
      </div>
      
      <div class="features">
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </div>
          <div class="feature-title">Capture</div>
          <div class="feature-desc">Instant screenshots</div>
        </div>
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="16" x2="12" y2="12"/>
              <line x1="12" y1="8" x2="12.01" y2="8"/>
            </svg>
          </div>
          <div class="feature-title">Analyze</div>
          <div class="feature-desc">AI-powered insights</div>
        </div>
        <div class="feature">
          <div class="feature-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
          </div>
          <div class="feature-title">Export</div>
          <div class="feature-desc">Copy & share results</div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="options.js"></script>
</body>
</html>
