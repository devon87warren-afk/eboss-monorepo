steps:
  # -------------------------------------------------------
  # Step 1: Build the Docker image for apps/manager
  # -------------------------------------------------------
  - id: build-image
    name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - --tag
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA"
      - --tag
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:latest"
      - --cache-from
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:latest"
      - --file
      - apps/manager/Dockerfile
      - .
    waitFor: ["-"]

  # -------------------------------------------------------
  # Step 2: Push the image to Artifact Registry
  # -------------------------------------------------------
  - id: push-image
    name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - --all-tags
      - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME"
    waitFor:
      - build-image

  # -------------------------------------------------------
  # Step 3: Deploy to Cloud Run using service.yaml
  # -------------------------------------------------------
  - id: deploy-cloud-run
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk:slim"
    entrypoint: bash
    args:
      - -c
      - |
        # Substitute image placeholder in service.yaml then apply
        sed "s|IMAGE_PLACEHOLDER|$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA|g" \
          service.yaml > /tmp/service-resolved.yaml
        gcloud run services replace /tmp/service-resolved.yaml \
          --region "$_REGION"
    waitFor:
      - push-image

# Images to push to Artifact Registry
images:
  - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:$COMMIT_SHA"
  - "$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/$_SERVICE_NAME:latest"

# Default substitution values (override in Cloud Build trigger settings)
substitutions:
  _REGION: us-central1
  _REPO_NAME: eboss
  _SERVICE_NAME: eboss-manager

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1200s
